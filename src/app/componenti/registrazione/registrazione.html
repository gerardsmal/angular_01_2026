<div class="container">
<h1>Nuovo Utente</h1>
<form #registForm="ngForm" (ngSubmit)="onSubmit()">
    <mat-form-field>
        <mat-label>UserName</mat-label>
        <input matInput type="text" name="userName" placeholder="introdure username" ngModel required/>
    </mat-form-field>
 
    <mat-form-field>
        <mat-label>Email</mat-label>
        <input matInput type="text" name="email" placeholder="introdure email" ngModel required/>
    </mat-form-field>
 
    <mat-form-field>
        <mat-label>Password</mat-label>
        <input matInput type="password" name="password" placeholder="introdure password" ngModel required/>
    </mat-form-field>

   <mat-form-field>
        <mat-label>Retype Password</mat-label>
        <input matInput type="password" name="passwordCntrl" placeholder="introdure password" ngModel required/>
    </mat-form-field>


    <p style="color: red;">{{msg()}}</p>

    <div class="button-group">
        <button class="btn btn-primary" type="submit" [disabled]="!registForm.valid">Registra</button>
        
    </div>


</form>
</div>
